services:
  postgres:
    image: postgres:16-alpine
    container_name: governix-postgres
    environment:
      POSTGRES_DB: governix
      POSTGRES_USER: governix
      POSTGRES_PASSWORD: governix
    ports:
      - "5432:5432"
    volumes:
      - governix-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governix -d governix"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  governix-postgres-data:

